<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Dood — draw it live</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#D85A30">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Dood">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">

<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <span class="dots"><span></span><span></span></span>
      Dood
    </div>
    <nav>
      <button id="tabFeed" class="active">Feed</button>
      <button id="tabNew">+ New</button>
    </nav>
  </header>

  <main>
    <section id="feedView" class="view active">
      <div id="feedList"></div>
    </section>

    <section id="choiceView" class="view">
      <p class="hint" style="margin-top:0;">What are you making?</p>
      <div class="choice-grid">
        <button class="choice-card" id="choiceDraw">
          <span class="choice-icon">✏️</span>
          <span class="choice-title">Draw</span>
          <span class="choice-sub">one image</span>
        </button>
        <button class="choice-card" id="choiceAnimate">
          <span class="choice-icon">🎞️</span>
          <span class="choice-title">Animate</span>
          <span class="choice-sub">a few frames, looped</span>
        </button>
      </div>
    </section>

    <section id="drawView" class="view">
      <div class="canvas-shell">
        <canvas id="drawCanvas" width="600" height="338"></canvas>
      </div>
      <div class="toolbar">
        <div class="row">
          <div class="swatches" id="swatches"></div>
          <label class="color-wheel-wrap" title="Full color picker">
            <span class="wheel-visual"></span>
            <input type="color" id="colorWheel" value="#222222">
          </label>
          <div class="spacer"></div>
          <button class="icon-btn" id="eraserBtn" title="Eraser">◌</button>
          <button class="icon-btn" id="undoBtn" title="Undo">↺</button>
          <button class="icon-btn" id="clearBtn" title="Clear layer">✕</button>
        </div>
        <div class="row">
          <span style="font-size:12px;color:var(--muted);">brush</span>
          <input type="range" class="size-slider" id="sizeSlider" min="2" max="26" value="6">
        </div>
        <div class="row">
          <button class="icon-btn wide" id="layersToggleBtn" title="Layers">▤ Layers</button>
        </div>

        <div class="layers-panel" id="layersPanel">
          <div class="layers-list" id="layersList"></div>
          <button class="btn ghost small" id="addLayerBtn">+ Add layer</button>
        </div>

        <div class="row">
          <button class="btn ghost" id="backBtn">Cancel</button>
          <div class="spacer"></div>
          <button class="btn primary" id="postBtn">Post</button>
        </div>
      </div>
      <p class="hint">Draw with your finger, stylus, or mouse — every post is tagged with what you used.</p>
    </section>

    <section id="animateView" class="view">
      <div class="canvas-shell">
        <canvas id="animateCanvas" width="600" height="338"></canvas>
      </div>

      <div class="frame-strip" id="frameStrip"></div>

      <div class="toolbar">
        <div class="row">
          <div class="swatches" id="swatchesAnim"></div>
          <label class="color-wheel-wrap" title="Full color picker">
            <span class="wheel-visual"></span>
            <input type="color" id="colorWheelAnim" value="#222222">
          </label>
          <div class="spacer"></div>
          <button class="icon-btn" id="eraserBtnAnim" title="Eraser">◌</button>
          <button class="icon-btn" id="undoBtnAnim" title="Undo">↺</button>
          <button class="icon-btn" id="clearBtnAnim" title="Clear frame">✕</button>
          <button class="icon-btn" id="deleteFrameBtn" title="Delete this frame">🗑</button>
        </div>
        <div class="row">
          <span style="font-size:12px;color:var(--muted);">brush</span>
          <input type="range" class="size-slider" id="sizeSliderAnim" min="2" max="26" value="6">
        </div>
        <div class="row">
          <button class="icon-btn wide" id="onionToggleBtn" title="Onion skin">◐ Onion skin</button>
          <button class="icon-btn wide" id="previewBtn" title="Preview loop">▶ Preview</button>
        </div>
        <div class="row">
          <button class="btn ghost" id="backBtnAnim">Cancel</button>
          <div class="spacer"></div>
          <button class="btn primary" id="postBtnAnim">Post</button>
        </div>
      </div>
      <p class="hint">Each frame starts as a copy of the last one — tweak it a little, add a frame, repeat.</p>
    </section>
  </main>
</div>

<div class="modal-bg" id="replayModal">
  <div class="modal">
    <div class="modal-top">
      <strong style="font-size:14px;">Replay</strong>
      <span class="tag" id="replayTag"></span>
      <button id="closeReplay">✕</button>
    </div>
    <canvas id="replayCanvas" width="600" height="338"></canvas>
    <div class="modal-controls">
      <button class="btn ghost" id="replayAgain">Replay again</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
