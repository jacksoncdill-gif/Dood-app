<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Dood — draw it live</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1D5FE0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Dood">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <span class="dots"><span></span><span></span></span>
      Dood
      <small>prototype</small>
    </div>
    <nav>
      <button id="tabFeed" class="active">Feed</button>
      <button id="tabNew">+ New</button>
    </nav>
  </header>

  <main>
    <section id="feedView" class="view active">
      <div id="feedList"></div>
    </section>

    <section id="choiceView" class="view">
      <p class="hint" style="margin-top:0;">What are you making?</p>
      <div class="choice-grid">
        <button class="choice-card" id="choiceDraw">
          <span class="choice-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 20l1-5L16 4l4 4L9 19z"/>
              <path d="M14 6l4 4"/>
            </svg>
          </span>
          <span class="choice-title">Draw</span>
          <span class="choice-sub">one image</span>
        </button>
        <button class="choice-card" id="choiceAnimate">
          <span class="choice-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="5" width="18" height="14" rx="2"/>
              <path d="M8 5v14M16 5v14M3 9h5M16 9h5M3 15h5M16 15h5"/>
            </svg>
          </span>
          <span class="choice-title">Animate</span>
          <span class="choice-sub">a few frames, looped</span>
        </button>
      </div>
    </section>

    <section id="drawView" class="view">
      <div class="palette-strip">
        <div class="swatches" id="swatches"></div>
        <label class="color-wheel-wrap" title="Full color picker">
          <span class="wheel-visual"></span>
          <input type="color" id="colorWheel" value="#1C1A17" aria-label="Choose any color">
        </label>
        <div class="mascot-slot" id="mascot" data-state="idle" aria-hidden="true">
          <svg viewBox="0 0 40 40">
            <path d="M20 4c9 0 16 6 16 15s-8 17-16 17S4 28 4 19 11 4 20 4z" fill="var(--mint)" stroke="var(--ink)" stroke-width="2"/>
            <g class="face-idle">
              <circle cx="15" cy="18" r="2.2" fill="var(--ink)"/>
              <circle cx="25" cy="17" r="1.6" fill="var(--ink)"/>
              <path d="M14 26q6 4 12 0" stroke="var(--ink)" stroke-width="2" fill="none" stroke-linecap="round"/>
            </g>
            <g class="face-happy">
              <path d="M12 17q3-3 6 0" stroke="var(--ink)" stroke-width="2" fill="none" stroke-linecap="round"/>
              <path d="M22 16q3-3 6 0" stroke="var(--ink)" stroke-width="2" fill="none" stroke-linecap="round"/>
              <path d="M13 24q7 7 14 0" stroke="var(--ink)" stroke-width="2.4" fill="none" stroke-linecap="round"/>
            </g>
            <g class="face-alarmed">
              <circle cx="15" cy="17" r="2.8" fill="var(--ink)"/>
              <circle cx="25" cy="16" r="2.8" fill="var(--ink)"/>
              <circle cx="20" cy="27" r="2.6" fill="var(--ink)"/>
            </g>
            <g class="face-confused">
              <circle cx="15" cy="18" r="2" fill="var(--ink)"/>
              <path d="M22 15q2-3 4 0" stroke="var(--ink)" stroke-width="2" fill="none" stroke-linecap="round"/>
              <path d="M14 26q6 -2 12 0" stroke="var(--ink)" stroke-width="2" fill="none" stroke-linecap="round"/>
            </g>
          </svg>
        </div>
      </div>
      <div class="canvas-shell">
        <canvas id="drawCanvas" width="600" height="338"></canvas>
      </div>

      <div class="tool-console">
        <p class="tool-caption" id="toolCaption">Brush — for most drawing</p>
        <div class="toolbar">
          <div class="row">
            <button class="icon-btn active" id="brushBtn" aria-label="Brush" aria-pressed="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M4 20c0-3 2-5 5-5"/>
                <path d="M9 15 18 6a2 2 0 0 1 3 3l-9 9"/>
                <path d="M15 6l3 3"/>
              </svg>
            </button>
            <button class="icon-btn" id="eraserBtn" aria-label="Eraser" aria-pressed="false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M16 3l5 5-9 9H7l-4-4z"/>
                <path d="M7 17l9-9"/>
                <path d="M3 21h8"/>
              </svg>
            </button>
            <button class="icon-btn" id="undoBtn" aria-label="Undo last stroke">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M7 7 3 11l4 4"/>
                <path d="M3 11h11a6 6 0 0 1 0 12h-3"/>
              </svg>
            </button>
            <button class="icon-btn" id="redoBtn" aria-label="Redo (coming soon)" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M17 7l4 4-4 4"/>
                <path d="M21 11H10a6 6 0 0 0 0 12h3"/>
              </svg>
            </button>
            <div class="spacer"></div>
            <button class="icon-btn" id="clearBtn" aria-label="Clear this layer">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M4 7h16"/>
                <path d="M9 7V4h6v3"/>
                <path d="M6 7l1 13h10l1-13"/>
              </svg>
            </button>
          </div>
          <div class="row">
            <span style="font-size:12px;color:#f2ead8;font-weight:700;">brush</span>
            <input type="range" class="size-slider" id="sizeSlider" min="2" max="26" value="6" aria-label="Brush size">
          </div>
          <div class="row">
            <button class="icon-btn wide" id="layersToggleBtn" aria-label="Layers" aria-expanded="false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 3 3 8l9 5 9-5-9-5z"/>
                <path d="M3 13l9 5 9-5"/>
              </svg>
              Layers
            </button>
          </div>
        </div>
      </div>

      <div class="layers-panel" id="layersPanel">
        <div class="layers-list" id="layersList"></div>
        <button class="btn ghost small" id="addLayerBtn">+ Add layer</button>
      </div>

      <div class="row" style="margin-top:14px;">
        <button class="btn ghost" id="backBtn">Cancel</button>
        <div class="spacer"></div>
        <button class="btn primary" id="postBtn">Post</button>
      </div>
      <p class="hint">Draw with your finger, stylus, or mouse — every post is tagged with what you used.</p>
    </section>

    <section id="animateView" class="view">
      <div class="canvas-shell">
        <canvas id="animateCanvas" width="600" height="338"></canvas>
      </div>

      <div class="frame-strip" id="frameStrip"></div>

      <div class="toolbar">
        <div class="row">
          <div class="swatches" id="swatchesAnim"></div>
          <label class="color-wheel-wrap" title="Full color picker">
            <span class="wheel-visual"></span>
            <input type="color" id="colorWheelAnim" value="#222222">
          </label>
          <div class="spacer"></div>
          <button class="icon-btn" id="eraserBtnAnim" title="Eraser">◌</button>
          <button class="icon-btn" id="undoBtnAnim" title="Undo">↺</button>
          <button class="icon-btn" id="clearBtnAnim" title="Clear layer">✕</button>
          <button class="icon-btn" id="deleteFrameBtn" title="Delete this frame">🗑</button>
        </div>
        <div class="row">
          <span style="font-size:12px;color:var(--muted);">brush</span>
          <input type="range" class="size-slider" id="sizeSliderAnim" min="2" max="26" value="6">
        </div>
        <div class="row">
          <button class="icon-btn wide" id="layersToggleBtnAnim" aria-label="Layers" aria-expanded="false">Layers</button>
        </div>
      </div>

      <div class="layers-panel" id="layersPanelAnim">
        <div class="layers-list" id="layersListAnim"></div>
        <button class="btn ghost small" id="addLayerBtnAnim">+ Add layer</button>
      </div>

      <div class="toolbar" style="margin-top:8px;">
        <div class="row">
          <button class="icon-btn wide" id="onionToggleBtn" title="Onion skin">◐ Onion skin</button>
          <button class="icon-btn wide" id="previewBtn" title="Preview loop">▶ Preview</button>
        </div>
        <div class="row">
          <button class="icon-btn wide" id="newFrameModeBtn" title="Choose what a new frame starts as" aria-pressed="false">+ Copy last frame</button>
        </div>
        <div class="row" style="margin-top:14px;">
          <button class="btn ghost" id="backBtnAnim">Cancel</button>
          <div class="spacer"></div>
          <button class="btn primary" id="postBtnAnim">Post</button>
        </div>
      </div>
      <p class="hint" id="animHint">Copy mode: each new frame starts as the last one — tweak it a little, add a frame, repeat. Each frame supports up to 3 layers.</p>
    </section>
  </main>
</div>

<div class="modal-bg" id="replayModal">
  <div class="modal">
    <div class="modal-top">
      <strong style="font-size:14px;">Replay</strong>
      <span class="tag" id="replayTag"></span>
      <button id="closeReplay">✕</button>
    </div>
    <canvas id="replayCanvas" width="600" height="338"></canvas>
    <div class="modal-controls">
      <button class="btn ghost" id="replayAgain">Replay again</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
